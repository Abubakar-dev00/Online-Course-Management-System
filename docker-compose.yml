version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: course_mysql_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: course_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: course_tkinter_app
    environment:
      - DB_HOST=db
      # You need to pass DISPLAY variable to run GUI application from Docker
      # For Windows using VcXsrv/Xming, you typically set it to host.docker.internal:0.0
      - DISPLAY=host.docker.internal:0.0
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  db_data:
